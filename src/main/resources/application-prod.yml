server:
  port: 8094
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/categoriasdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: categorias_user
    password: categorias_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration/mysql

eureka:
  client:
    serviceUrl:
      defaultZone: http://registry-server:8761/eureka/
  instance:
    prefer-ip-address: false
    hostname: categorias

logging:
  level:
    root: WARN
    com.upeu: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
